# @package _global_
# configs/experiment/cnn_step5_context.yaml
#
# Step 5 — + global object context.
# Cumulative: normals + splatting + bilinear (step 4) + context (this step).
# Only new change: use_global_context = true.
#
# Mechanism: after CNN encode, every fragment's bottleneck is global-average-
# pooled to a vector; all fragments from the same object are mean-aggregated
# into a single object descriptor; this descriptor is broadcast spatially and
# fused into each fragment's bottleneck via a 1x1 conv (concat → project).
# Each fragment's decode thus has access to a summary of all other fragments.
#
# This is a lightweight approximation of GARF's global PTv3 encoder reasoning.
# Unlike PTv3, which has direct cross-point attention across all fragments,
# this method uses a single mean-pooled descriptor — simpler but potentially
# noisier (mean might wash out discriminative information).
#
# Hypothesis: objects where fracture geometry is globally consistent (e.g.
# flat breaks) should benefit more than objects with irregular breaks.
# Watch result variance — high variance may indicate mean-pooling is too noisy.

defaults:
  - cnn_ablation_shared
  - _self_

experiment_name: cnn_step5_context
tags: ["cnn", "ablation", "step5", "context"]

model:
  use_normals: true
  splat_sigma: 1.5
  use_bilinear: true
  use_global_context: true   # ← only new change vs step 4
