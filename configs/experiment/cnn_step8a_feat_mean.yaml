# @package _global_
# configs/experiment/cnn_step8a_feat_mean.yaml
#
# Step 8a — Feature-level mean fusion.
# Same full pipeline as Step 7 (U-Net + all features) but moves view fusion
# from prediction level (backprojection) to bottleneck level.
#
# Fusion: weighted mean of V bottleneck maps (weights from view_attn).
# Each decoder then sees the same cross-view semantic representation,
# while keeping view-specific skip connections for spatial detail.
#
# Hypothesis: shared bottleneck semantics improve boundary precision
# because the decoder reasons about the object, not a single view.

defaults:
  - cnn_ablation_shared
  - _self_

experiment_name: cnn_step8a_feat_mean
tags: ["cnn", "ablation", "step8", "feature_fusion", "mean"]

trainer:
  max_epochs: 100

model:
  use_normals: true
  splat_sigma: 1.5
  use_bilinear: true
  use_global_context: true
  use_view_attn: true
  view_attn_hidden: 16
  backbone: unet
  unet_depth: 4
  feature_fusion: "mean"
